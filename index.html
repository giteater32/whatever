<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Machine Learning Taxonomy</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surface: #0f0f1a;
    --border: #1e1e35;
    --text: #e2e2f0;
    --muted: #666688;
    --accent: #7c6aff;

    --c1: #7c6aff; /* Supervised */
    --c2: #00d4a8; /* Unsupervised */
    --c3: #ff6b6b; /* Reinforcement */
    --c4: #ffb347; /* Deep Learning */
    --c5: #64c8ff; /* Semi/Self Supervised */
    --c6: #ff7eb3; /* Transfer/Meta */
    --c7: #a8ff78; /* Ensemble */
    --c8: #ffd700; /* Fundamentals */
    --c9: #d0a0ff; /* Generative */
    --c10: #ff9500; /* Probabilistic */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    background: linear-gradient(135deg, #7c6aff, #00d4a8, #ff6b6b, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px 10px 36px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    border-radius: 6px;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent); }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .stats {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 10px 0;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .legend-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* TREE */
  .tree-root {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* NODE CARD */
  .node {
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.2s;
  }

  .node-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .node-header:hover { background: rgba(255,255,255,0.04); }

  .toggle-icon {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    transition: transform 0.2s;
    color: var(--muted);
    font-style: normal;
  }

  .node.open > .node-header .toggle-icon { transform: rotate(90deg); }

  .node-label {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .node-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    color: var(--bg);
    font-weight: 700;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .node-children {
    display: none;
    padding-left: 24px;
    border-left: 1px solid var(--border);
    margin-left: 20px;
    margin-top: 4px;
    padding-bottom: 6px;
  }

  .node.open > .node-children { display: block; }

  /* LEAF items */
  .leaf-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 6px;
    padding: 8px 0 10px 0;
  }

  .leaf {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 6px 10px;
    font-size: 11.5px;
    color: #c8c8e0;
    transition: all 0.15s;
    cursor: default;
    line-height: 1.4;
  }

  .leaf:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(124,106,255,0.4);
    color: var(--text);
  }

  .leaf .leaf-name { font-weight: 600; }
  .leaf .leaf-desc { color: var(--muted); font-size: 10px; margin-top: 2px; }

  /* Depth coloring for borders */
  .depth-0 > .node-header { border-left-color: transparent; background: var(--surface); border-radius: 8px 8px 0 0; }
  .depth-1 > .node-header { border-left-color: currentColor; }
  .depth-2 > .node-header { border-left-color: currentColor; opacity: 0.95; }

  /* highlight search */
  .hl { background: rgba(255,211,0,0.25); border-radius: 2px; color: #ffd700; }

  .hidden { display: none !important; }

  /* SECTION WRAPPERS at top level */
  .section {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
  }

  .section-header {
    padding: 14px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }

  .section-header:hover { opacity: 0.9; }

  .section-body {
    display: none;
    padding: 12px 14px 14px;
  }

  .section.open .section-body { display: block; }

  .section-toggle {
    margin-left: auto;
    font-size: 13px;
    transition: transform 0.2s;
    color: rgba(255,255,255,0.5);
  }

  .section.open .section-toggle { transform: rotate(180deg); }

  .count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    margin-top: 40px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .leaf-list { grid-template-columns: 1fr; }
  }
</style>
</head>

let totalLeaves = 0;

function countLeaves(node) {
  if (node.leaves) return node.leaves.length;
  if (node.children) return node.children.reduce((s, c) => s + countLeaves(c), 0);
  return 0;
}

function buildLeafList(leaves, color) {
  const div = document.createElement('div');
  div.className = 'leaf-list';
  for (const leaf of leaves) {
    const el = document.createElement('div');
    el.className = 'leaf';
    el.style.borderLeftColor = color + '55';
    el.style.borderLeftWidth = '3px';
    el.innerHTML = `<div class="leaf-name">${leaf.name}</div>${leaf.desc ? `<div class="leaf-desc">${leaf.desc}</div>` : ''}`;
    div.appendChild(el);
  }
  return div;
}

function buildNode(node, color, depth) {
  const count = countLeaves(node);
  totalLeaves += (depth === 0) ? 0 : 0; // counted at top

  const wrapper = document.createElement('div');
  wrapper.className = `node depth-${depth}`;
  wrapper.style.color = color;

  const header = document.createElement('div');
  header.className = 'node-header';
  header.style.borderLeftColor = color + 'aa';

  const toggle = document.createElement('span');
  toggle.className = 'toggle-icon';
  toggle.textContent = '▶';

  const label = document.createElement('span');
  label.className = 'node-label';
  label.style.color = depth === 0 ? color : (depth === 1 ? '#ddd' : '#bbb');
  label.innerHTML = node.label;

  const badge = document.createElement('span');
  badge.style.cssText = `font-size:10px;color:${color}80;font-family:'JetBrains Mono',monospace;`;
  badge.textContent = `${count} items`;

  header.appendChild(toggle);
  header.appendChild(label);
  header.appendChild(badge);
  wrapper.appendChild(header);

  const children = document.createElement('div');
  children.className = 'node-children';

  if (node.leaves) {
    children.appendChild(buildLeafList(node.leaves, color));
  }
  if (node.children) {
    for (const child of node.children) {
      children.appendChild(buildNode(child, color, depth + 1));
    }
  }

  wrapper.appendChild(children);
  header.addEventListener('click', () => {
    wrapper.classList.toggle('open');
  });

  return wrapper;
}

function buildTree() {
  const tree = document.getElementById('tree');
  const legend = document.getElementById('legend');
  let total = 0;

  for (const section of TAXONOMY) {
    const color = section.color;
    const count = section.children.reduce((s, c) => s + countLeaves(c), 0);
    total += count;

    // Legend item
    const li = document.createElement('div');
    li.className = 'legend-item';
    li.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${section.label}`;
    li.addEventListener('click', () => {
      const el = document.getElementById('section-' + section.id);
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      if (!el.classList.contains('open')) el.classList.add('open');
    });
    legend.appendChild(li);

    // Section
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'section-' + section.id;
    sec.style.borderColor = color + '40';

    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.style.background = `linear-gradient(135deg, ${color}18, transparent)`;
    sh.innerHTML = `
      <div style="width:14px;height:14px;border-radius:50%;background:${color};flex-shrink:0;box-shadow:0 0 12px ${color}80"></div>
      <span style="color:${color}">${section.label}</span>
      <span class="count-badge">${count} algorithms</span>
      <span style="color:${color}70;font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:4px;flex:1">${section.desc || ''}</span>
      <span class="section-toggle">▼</span>
    `;

    const sb = document.createElement('div');
    sb.className = 'section-body';

    for (const child of section.children) {
      sb.appendChild(buildNode(child, color, 1));
    }

    sh.addEventListener('click', () => sec.classList.toggle('open'));
    sec.appendChild(sh);
    sec.appendChild(sb);
    tree.appendChild(sec);
  }

  document.getElementById('stats').textContent =
    `${TAXONOMY.length} paradigms · ~${total}+ algorithms, techniques & concepts`;
}

function expandAll() {
  document.querySelectorAll('.section, .node').forEach(el => el.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.section, .node').forEach(el => el.classList.remove('open'));
}

function expandTopLevel() {
  document.querySelectorAll('.section').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.node').forEach(el => el.classList.remove('open'));
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    document.querySelectorAll('.leaf, .node, .section').forEach(el => {
      el.classList.remove('hidden');
      el.querySelectorAll('.hl').forEach(h => {
        h.outerHTML = h.textContent;
      });
    });
    return;
  }

  document.querySelectorAll('.section').forEach(sec => sec.classList.add('open'));
  document.querySelectorAll('.node').forEach(node => {
    node.classList.add('open');
    node.classList.remove('hidden');
  });

  document.querySelectorAll('.leaf').forEach(leaf => {
    const text = leaf.textContent.toLowerCase();
    if (text.includes(q)) {
      leaf.classList.remove('hidden');
      leaf.querySelectorAll('.hl').forEach(h => h.outerHTML = h.textContent);
      ['leaf-name', 'leaf-desc'].forEach(cls => {
        const el = leaf.querySelector('.' + cls);
        if (el) {
          const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
          el.innerHTML = el.textContent.replace(regex, '<span class="hl">$1</span>');
        }
      });
    } else {
      leaf.classList.add('hidden');
    }
  });
});
