<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML & Data Science — Complete Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060f;--surface:#0b0b18;--border:#161628;
  --text:#ddddf5;--muted:#44446a;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 15%,rgba(124,106,255,.05) 0%,transparent 65%),
    radial-gradient(ellipse 50% 35% at 85% 85%,rgba(0,212,168,.04) 0%,transparent 65%),
    linear-gradient(rgba(124,106,255,.02) 1px,transparent 1px) 0 0/48px 48px,
    linear-gradient(90deg,rgba(124,106,255,.02) 1px,transparent 1px) 0 0/48px 48px;
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.container{position:relative;z-index:1;max-width:1800px;margin:0 auto;padding:20px}
header{text-align:center;padding:36px 20px 24px;border-bottom:1px solid var(--border);margin-bottom:22px;position:relative}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:180px;height:2px;background:linear-gradient(90deg,transparent,#7c6aff,transparent)}
.title{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,46px);font-weight:800;
  background:linear-gradient(135deg,#7c6aff 0%,#00d4a8 40%,#ff6b6b 70%,#ffd700 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.subtitle{color:var(--muted);font-size:10px;margin-top:8px;letter-spacing:3px;text-transform:uppercase}
.hint{color:#3d3d60;font-size:11px;margin-top:5px}
.hint b{color:#7c6aff}

/* ── CONTROLS ── */
.top-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:200px;position:relative}
.sw::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px;pointer-events:none}
#srch{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:9px 12px 9px 34px;font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;border-radius:6px;transition:border-color .2s}
#srch:focus{border-color:#7c6aff}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:9px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;
  cursor:pointer;border-radius:6px;transition:all .2s;white-space:nowrap}
.btn:hover{border-color:#7c6aff;color:#7c6aff}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;
  padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);
  cursor:pointer;padding:3px 9px;border-radius:4px;transition:all .2s}
.leg:hover{background:rgba(255,255,255,.05);color:var(--text)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(540px,1fr));gap:16px}

/* ── CARD ── */
.graph-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .3s}
.graph-card:hover{border-color:rgba(255,255,255,.1)}
.card-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s}
.card-head:hover{background:rgba(255,255,255,.03)}
.card-glow{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.card-lbl{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;flex:1}
.card-cnt{font-size:10px;color:var(--muted);padding:3px 8px;border:1px solid var(--border);border-radius:99px}
.card-arr{font-size:11px;color:var(--muted);transition:transform .3s;margin-left:4px}
.graph-card.open .card-arr{transform:rotate(180deg)}
.graph-body{display:none;border-top:1px solid var(--border);background:rgba(0,0,0,.25);position:relative}
.graph-card.open .graph-body{display:block}
.graph-body svg{display:block;width:100%}

/* ── TOOLBAR ── */
.gtb{position:absolute;top:10px;right:10px;z-index:10;display:flex;gap:5px}
.gtb button{background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);
  padding:5px 10px;font-size:9px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:4px;
  backdrop-filter:blur(8px);transition:all .15s}
.gtb button:hover{color:#fff;border-color:rgba(255,255,255,.3)}

/* ── DEPTH INDICATOR ── */
.depth-legend{position:absolute;bottom:10px;left:14px;display:flex;gap:10px;z-index:10}
.di{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted)}
.di-circle{border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}

/* ── D3 STYLES ── */
.nd circle{cursor:pointer;transition:filter .2s}
.nd circle:hover{filter:brightness(1.4) !important}
.nd text{font-family:'IBM Plex Mono',monospace;pointer-events:none;dominant-baseline:middle}
.lk{fill:none;opacity:.35;transition:opacity .2s}
.lk:hover{opacity:.8}
.nd.hl circle{stroke:#ffd700 !important;stroke-width:2.5 !important}
.nd.dm{opacity:.12}
.nd.hl{opacity:1 !important}

/* ── TOOLTIP ── */
#tip{position:fixed;background:rgba(8,8,18,.96);border:1px solid rgba(255,255,255,.15);
  color:var(--text);padding:9px 13px;border-radius:7px;font-size:11px;
  pointer-events:none;z-index:9999;max-width:240px;display:none;
  box-shadow:0 6px 28px rgba(0,0,0,.6);backdrop-filter:blur(12px)}
#tip .tn{font-weight:700;margin-bottom:3px;font-size:12px}
#tip .td{color:var(--muted);font-size:10px}
#tip .ti{color:#555577;font-size:9px;margin-top:4px;font-style:italic}

@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>

<div id="tip"><div class="tn"></div><div class="td"></div><div class="ti"></div></div>

// ─── GRAPH ENGINE ─────────────────────────────────────────────────────────────
const H = 500;
let uid = 0;

// Node radii by depth
const R = [12, 8.5, 6, 4.5, 3.5];

function getR(depth){ return R[Math.min(depth, R.length-1)]; }

function countAll(node){
  const ch = node.children || node._children || [];
  return ch.length + ch.reduce((s,c)=>s+countAll(c),0);
}

function buildGraph(sec, idx){
  const wrap = document.getElementById('gbody-'+idx);
  if(!wrap || wrap.dataset.built==='1') return;
  wrap.dataset.built='1';

  const color = sec.color;
  const W = wrap.clientWidth || 560;
  const svg = d3.select(wrap).append('svg').attr('width',W).attr('height',H);

  // glow defs
  const defs = svg.append('defs');
  ['root','branch'].forEach(k=>{
    const f = defs.append('filter').attr('id',`gf-${k}-${idx}`);
    f.append('feGaussianBlur').attr('stdDeviation', k==='root'?4:2.5).attr('result','bl');
    const m = f.append('feMerge');
    m.append('feMergeNode').attr('in','bl');
    m.append('feMergeNode').attr('in','SourceGraphic');
  });

  // gradient for links
  const lg = defs.append('linearGradient').attr('id','lg-'+idx)
    .attr('x1','0%').attr('y1','0%').attr('x2','100%').attr('y2','0%');
  lg.append('stop').attr('offset','0%').attr('stop-color',color).attr('stop-opacity',0.8);
  lg.append('stop').attr('offset','100%').attr('stop-color',color).attr('stop-opacity',0.15);

  const g = svg.append('g').attr('transform',`translate(80,${H/2})`);

  svg.call(d3.zoom().scaleExtent([0.2,4]).on('zoom', e=>g.attr('transform',e.transform)));

  // Build hierarchy
  const root = d3.hierarchy({name: sec.label, desc: sec.desc, children: sec.children});

  // Assign unique ids
  root.each(d=>{ d.uid = ++uid; });

  // Start: depth >= 2 collapsed
  root.each(d=>{
    if(d.depth >= 2 && d.children){ d._children=d.children; d.children=null; }
  });

  const tree = d3.tree().nodeSize([20, 190]);
  let i2=0;

  function update(src){
    tree(root);
    const nodes = root.descendants();
    const links = root.links();

    // ── LINKS ──
    const lsel = g.selectAll('.lk').data(links, d=>d.target.uid);

    const lEnter = lsel.enter().insert('path','g')
      .attr('class','lk')
      .attr('stroke', `url(#lg-${idx})`)
      .attr('d',()=>{
        const o={x:src.x0||0, y:src.y0||0};
        return bez({source:o,target:o});
      });

    lsel.merge(lEnter).transition().duration(380).attr('d', bez);

    lsel.exit().transition().duration(280)
      .attr('d',()=>{ const o={x:src.x,y:src.x}; return bez({source:o,target:o}); })
      .remove();

    // ── NODES ──
    const nsel = g.selectAll('.nd').data(nodes, d=>d.uid||(d.uid=++i2));

    const nEnter = nsel.enter().append('g')
      .attr('class','nd')
      .attr('transform',()=>`translate(${src.y0||0},${src.x0||0})`)
      .style('cursor','pointer')
      .on('click',(e,d)=>{
        e.stopPropagation();
        if(d.children){ d._children=d.children; d.children=null; }
        else if(d._children){ d.children=d._children; d._children=null; }
        update(d);
        showTip(e,d,color);
      })
      .on('mouseover',(e,d)=>showTip(e,d,color))
      .on('mouseout',()=>hideTip());

    // outer glow ring (for nodes with children)
    nEnter.append('circle')
      .attr('class','gring')
      .attr('r',0)
      .attr('fill','none')
      .attr('stroke', color)
      .attr('stroke-width',1)
      .attr('opacity',0.2);

    // main circle
    nEnter.append('circle')
      .attr('class','main')
      .attr('r',0)
      .attr('stroke-width', d=> d.depth===0 ? 2.5 : d.depth<=2 ? 2 : 1.5);

    // label
    nEnter.append('text')
      .attr('dy','0.32em')
      .style('font-size', d=> d.depth===0?'11px': d.depth===1?'10px': d.depth===2?'9.5px':'8.5px')
      .style('font-weight', d=> d.depth<=1?'700': d.depth===2?'600':'400');

    const nMerge = nsel.merge(nEnter);

    nMerge.transition().duration(380)
      .attr('transform', d=>`translate(${d.y},${d.x})`);

    const r = d=> getR(d.depth);

    nMerge.select('.gring').transition().duration(380)
      .attr('r', d=> (d.children||d._children) ? r(d)+4 : 0)
      .attr('opacity', d=> (d.children||d._children) ? 0.25 : 0);

    nMerge.select('.main').transition().duration(380)
      .attr('r', r)
      .attr('fill', d=>{
        if(d.depth===0) return color;
        if(d.depth===1) return color+'cc';
        if(d.depth===2) return color+'88';
        if(d.depth===3) return color+'55';
        return color+'33';
      })
      .attr('stroke', d=>{
        if(d.depth===0) return '#ffffff';
        if(!d.children && !d._children) return color+'66';
        return color;
      })
      .attr('filter', d=> d.depth===0 ? `url(#gf-root-${idx})` : d.depth===1 ? `url(#gf-branch-${idx})` : null);

    nMerge.select('text')
      .attr('x', d=> (d.children||d._children) ? -(r(d)+7) : (r(d)+7))
      .style('text-anchor', d=> (d.children||d._children) ? 'end' : 'start')
      .attr('fill', d=> d.depth===0?'#fff': d.depth<=2 ? '#ddd' : '#aaa')
      .text(d=> truncate(d.data.name, d.depth));

    nsel.exit().transition().duration(280)
      .attr('transform',()=>`translate(${src.y},${src.x})`)
      .remove()
      .select('.main').attr('r',0);

    nodes.forEach(d=>{ d.x0=d.x; d.y0=d.y; });
  }

  function bez(d){
    return `M${d.source.y},${d.source.x}
            C${(d.source.y+d.target.y)/2},${d.source.x}
             ${(d.source.y+d.target.y)/2},${d.target.x}
             ${d.target.y},${d.target.x}`;
  }

  function truncate(name, depth){
    const maxLen = depth===0?28: depth===1?22: depth===2?18:16;
    return name.length>maxLen ? name.slice(0,maxLen-1)+'…' : name;
  }

  update(root);

  // Store controls
  wrap._root = root;
  wrap._update = update;

  wrap.expandAll = ()=>{
    root.each(d=>{ if(d._children){ d.children=d._children; d._children=null; }});
    update(root);
  };
  wrap.collapseAll = ()=>{
    root.each(d=>{ if(d.depth>0 && d.children){ d._children=d.children; d.children=null; }});
    update(root);
  };
  wrap.resetView = ()=>{
    root.each(d=>{
      if(d.depth>=2 && d.children){ d._children=d.children; d.children=null; }
      else if(d.depth<2 && d._children){ d.children=d._children; d._children=null; }
    });
    update(root);
  };
}

// ─── TOOLTIP ──────────────────────────────────────────────────────────────────
const tip = document.getElementById('tip');
function showTip(e, d, color){
  const hasKids = d.children||d._children;
  const kCount = (d.children||d._children||[]).length;
  tip.querySelector('.tn').textContent = d.data.name;
  tip.querySelector('.tn').style.color = color;
  tip.querySelector('.td').textContent = d.data.desc || (hasKids ? `${kCount} sub-nodes` : 'Leaf node');
  tip.querySelector('.ti').textContent = hasKids
    ? (d.children ? 'Click to collapse ▲' : 'Click to expand ▼')
    : 'Terminal node';
  tip.style.display='block';
  tip.style.left=(e.clientX+16)+'px';
  tip.style.top=(e.clientY-12)+'px';
}
function hideTip(){ tip.style.display='none'; }

        <div class="di"><div class="di-circle" style="width:9px;height:9px;background:${sec.color}cc"></div>Category</div>
        <div class="di"><div class="di-circle" style="width:7px;height:7px;background:${sec.color}88"></div>Sub</div>
        <div class="di"><div class="di-circle" style="width:5px;height:5px;background:${sec.color}55"></div>Leaf</div>
      </div>
    </div>`;

  grid.appendChild(card);

  // Auto-build DS card immediately
  if(sec.id==='ds') setTimeout(()=>buildGraph(sec,si), 120);
});

function toggle(si){
  const card=document.getElementById('card-'+si);
  const isOpen=card.classList.toggle('open');
  if(isOpen) setTimeout(()=>buildGraph(DATA[si],si),50);
}

function openAll(){
  DATA.forEach((_,si)=>{
    const card=document.getElementById('card-'+si);
    if(!card.classList.contains('open')){
      card.classList.add('open');
      setTimeout(()=>buildGraph(DATA[si],si), si*100);
    }
  });
}
function closeAll(){
  DATA.forEach((_,si)=>document.getElementById('card-'+si).classList.remove('open'));
}
function resetAll(){
  DATA.forEach((_,si)=>{
    const w=document.getElementById('gbody-'+si);
    if(w&&w.resetView) w.resetView();
  });
}

// Search
document.getElementById('srch').addEventListener('input', function(){
  const q=this.value.trim().toLowerCase();
  if(!q){
    d3.selectAll('.nd').classed('hl',false).classed('dm',false);
    return;
  }
  // open all
  DATA.forEach((_,si)=>{
    const card=document.getElementById('card-'+si);
    if(!card.classList.contains('open')){
      card.classList.add('open');
      setTimeout(()=>{ buildGraph(DATA[si],si); setTimeout(doSearch,400); }, si*80);
    }
  });
  setTimeout(doSearch, 600);

  function doSearch(){
    d3.selectAll('.nd').each(function(d){
      const m = d.data.name.toLowerCase().includes(q) ||
                (d.data.desc&&d.data.desc.toLowerCase().includes(q));
      d3.select(this).classed('hl',m).classed('dm',!m);
    });
  }
});
</script>
</body>
</html>
